name: Module CI

# Reusable workflow for Altis module CI.
# Replaces travis/module.yml. Each module adds a thin caller at
# .github/workflows/ci.yml that invokes this with `uses: humanmade/altis-dev-tools/.github/workflows/module-ci.yml@<sha>`.

on:
  workflow_call:
    inputs:
      altis-package:
        description: 'Composer name of the package under test (e.g. altis/cms).'
        required: true
        type: string
      php-version:
        description: 'PHP version for the runner.'
        default: '8.3'
        type: string
      node-version:
        description: 'Node.js version for the runner.'
        default: '24'
        type: string
      test-command:
        description: "'codecept' (default) or 'phpunit'."
        default: 'codecept'
        type: string
      lint-docs:
        description: 'Run docs lint after tests.'
        default: true
        type: boolean
      runs-on:
        description: 'Runner image. Defaults to ubuntu-22.04 to match the previous Travis "jammy" dist.'
        default: 'ubuntu-22.04'
        type: string
      module-config:
        description: 'Optional JSON object merged into extra.altis.modules in the test-root composer.json. Used to enable opt-in module features for the CI run, e.g. ''{"media":{"private-media":true}}''.'
        default: ''
        type: string
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true

jobs:
  test:
    runs-on: ${{ inputs.runs-on }}
    env:
      COMPOSE_HTTP_TIMEOUT: '360'
      ES_MEM_LIMIT: '2g'
      COMPOSER_NO_INTERACTION: '1'
      ALTIS_PACKAGE: ${{ inputs.altis-package }}
      # BRANCH_NAME = source branch on PRs, pushed branch on push events.
      # BASE_REF    = target branch on PRs, pushed branch on push events.
      # Mirrors travis/module.yml, where BASE_BRANCH was derived from $TRAVIS_BRANCH (the target on PRs).
      BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
      BASE_REF: ${{ github.base_ref || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          tools: composer:v2
          coverage: none

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-php${{ inputs.php-version }}-${{ hashFiles('composer.json', 'composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-php${{ inputs.php-version }}-

      - name: Authenticate with Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Compute base branch
        # Logic mirrored in tests/ci-branch-resolution.sh — keep the two in sync.
        id: base
        shell: bash
        run: |
          if [[ "$BASE_REF" =~ ^(v[0-9]{2}-branch)$ ]]; then
            BASE_BRANCH="${BASH_REMATCH[1]}"
          else
            BASE_BRANCH="master"
          fi
          echo "base-branch=$BASE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "Branch under test: $BRANCH_NAME"
          echo "Target ref:        $BASE_REF"
          echo "Base branch:       $BASE_BRANCH"

      - name: Create Altis test root
        env:
          BASE_BRANCH: ${{ steps.base.outputs.base-branch }}
        shell: bash
        run: |
          set -euo pipefail
          composer create-project "altis/skeleton:dev-${BRANCH_NAME}" \
            --stability=dev --ignore-platform-req=php+ --ignore-platform-req=ext-* \
            "$HOME/test-root" || \
          composer create-project "altis/skeleton:dev-${BASE_BRANCH}" \
            --stability=dev --ignore-platform-req=php+ --ignore-platform-req=ext-* \
            "$HOME/test-root"

      - name: Install test theme and inject package under test
        env:
          BASE_BRANCH: ${{ steps.base.outputs.base-branch }}
          MODULE_CONFIG: ${{ inputs.module-config }}
        shell: bash
        run: |
          set -euo pipefail
          cd "$HOME/test-root"

          # Install Altis test theme.
          composer require altis/test-theme --ignore-platform-req=php+ --ignore-platform-req=ext-*

          # Mark the test theme as the default for the CMS module.
          jq '. * {"extra":{"altis":{"modules":{"cms":{"default-theme":"test-theme"},"dev-tools":{"codeception":{"modules":{"config":{"WPLoader":{"theme":"test-theme"}}}}}}}}}' composer.json > composer.json.tmp
          mv composer.json.tmp composer.json

          # Merge any caller-provided module config into extra.altis.modules.
          if [[ -n "$MODULE_CONFIG" ]]; then
            jq --argjson cfg "$MODULE_CONFIG" \
              '. * {"extra":{"altis":{"modules":$cfg}}}' \
              composer.json > composer.json.tmp
            mv composer.json.tmp composer.json
          fi

          # Use GitHub as the source for test to avoid packagist lag causing a race condition
          composer config "repositories.$ALTIS_PACKAGE" vcs "https://github.com/humanmade/altis-${ALTIS_PACKAGE#altis/}.git"

          # Inject the package under test, aliased so composer accepts the dev branch
          # against any existing version constraint.
          # Search both packages and packages-dev (e.g. altis/local-server is require-dev in skeleton).
          # Logic mirrored in tests/ci-version-resolution.sh — keep the two in sync.
          INSTALLED_VERSION=$(jq -r '(.packages[], .["packages-dev"][]) | select(.name==$pkg) | .version' --arg pkg "$ALTIS_PACKAGE" composer.lock | head -1)
          if [[ -z "$INSTALLED_VERSION" ]]; then
            # Package not present in lock — pick a high alias that satisfies any reasonable constraint.
            ALIAS_VERSION="9999.9.9"
          elif [[ "$INSTALLED_VERSION" =~ ^dev- ]]; then
            # Sibling packages may carry a `dev-master` (or similar) constraint on this package; alias to
            # the installed dev branch so the constraint is still satisfied. Mirrors Travis's `/^dev/q` sed.
            ALIAS_VERSION="$INSTALLED_VERSION"
          else
            # Concrete X.Y.Z — bump patch so the dev branch satisfies any caret/tilde constraint at that level.
            ALIAS_VERSION="${INSTALLED_VERSION}9"
          fi
          composer require -W "$ALTIS_PACKAGE:dev-${BRANCH_NAME} as ${ALIAS_VERSION}"

      - name: Generate WP salts and load.php guard
        shell: bash
        run: |
          set -euo pipefail
          cd "$HOME/test-root"
          echo "<?php" > .config/salts.php
          curl -fsSL "https://api.wordpress.org/secret-key/1.1/salt/" >> .config/salts.php
          if [ ! -f .config/load.php ]; then
            echo "<?php" > .config/load.php
          fi
          cat >> .config/load.php <<'PHP'
          if ( ( Altis\get_environment_type() === 'local' ) || ( Altis\get_environment_type() === 'ci' ) ) {
              if ( ! defined( 'AUTH_KEY' ) ) {
                  require_once __DIR__ . '/salts.php';
              }
          }
          PHP

      - name: Start local server
        shell: bash
        run: |
          set -euo pipefail
          cd "$HOME/test-root"
          composer server start

      - name: Run Codeception tests
        if: inputs.test-command == 'codecept'
        shell: bash
        run: |
          set -euo pipefail
          cd "$HOME/test-root"
          composer dev-tools codecept run -p "vendor/${ALTIS_PACKAGE}/tests"

      - name: Run PHPUnit tests
        if: inputs.test-command == 'phpunit'
        shell: bash
        run: |
          set -euo pipefail
          cd "$HOME/test-root"
          composer dev-tools phpunit "vendor/${ALTIS_PACKAGE}"

      - name: Bootstrap docs lint
        if: inputs.lint-docs
        shell: bash
        run: |
          set -euo pipefail
          cd "$HOME/test-root"
          composer dev-tools bootstrap lintdocs

      - name: Lint docs
        if: inputs.lint-docs
        shell: bash
        run: |
          set -euo pipefail
          cd "$HOME/test-root"
          composer dev-tools lintdocs -l "vendor/${ALTIS_PACKAGE}" all

      - name: Compute artifact name
        if: failure()
        id: artifact
        shell: bash
        run: |
          # Artifact names disallow '/', so substitute the composer-name slash with '-'.
          echo "name=codecept-output-${ALTIS_PACKAGE//\//-}-php${{ inputs.php-version }}" >> "$GITHUB_OUTPUT"

      - name: Upload Codeception output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: |
            ~/test-root/.tests/_output/
            ~/test-root/tests/_output/
            ~/test-root/vendor/${{ inputs.altis-package }}/tests/_output/
          if-no-files-found: ignore
          retention-days: 7
